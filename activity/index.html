<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MINA Stream</title>
    <style>
      :root {
        color: #f7f7fb;
        background: #0d0e13;
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
        background: radial-gradient(circle at 50% -20%, #34306a 0, #171822 42%, #0d0e13 100%);
      }

      body {
        min-height: 100vh;
      }

      main {
        width: min(1100px, 100%);
        margin: auto;
        padding: 28px;
      }

      .boot-fallback {
        margin-top: 16px;
        color: #aeb0be;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <span class="eyebrow">MINA · WATCH PARTY</span>
          <h1>Stream sincronizado</h1>
        </div>
        <span id="status" class="status">Conectando…</span>
      </header>
      <section class="player-shell">
        <video id="video" playsinline controls hidden></video>
        <div id="empty" class="empty">
          <span class="playmark">▶</span>
          <strong>Esperando un video</strong>
          <small>Pega un enlace HLS, MP4 o WebM para verlo juntos.</small>
        </div>
        <button id="sync-button" class="sync-button" type="button" hidden>Toca para ver sincronizado</button>
      </section>
      <form id="source-form">
        <input id="source" type="url" placeholder="https://servidor/video.m3u8" required />
        <button type="submit">Reproducir</button>
      </form>
      <p id="message" class="message"></p>
      <noscript>
        <p class="boot-fallback">Activa JavaScript para usar MINA Stream.</p>
      </noscript>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
